name: SpareFoot
kind: company
description: SpareFoot is the largest online marketplace for finding and reserving
  self-storage units, owned by Storable (the same parent that owns the storEDGE and
  SiteLink property-management systems, cataloged separately at api-evangelist/storable).
  SpareFoot itself does not publish a developer portal, API reference, or self-serve
  API keys for third parties to call. Instead, storage facilities' pricing, unit
  availability, and promotions reach SpareFoot through one-way, partner-gated data-feed
  integrations built by property-management software vendors - Storable Edge
  (storEDGE), SiteLink Web Edition, Storable Easy, Self Storage Manager (E-SoftSys),
  eDOMICO, and DoorSwap - each of which pushes its own facilities' inventory into
  the marketplace and receives reservation/lead data back. No endpoint list, request/response
  schema, or authentication scheme for this feed mechanism is publicly documented;
  a facility operator or software vendor must go through SpareFoot/Storable's
  integrations team to be onboarded. This entry documents that access model
  honestly rather than fabricating an API surface.
